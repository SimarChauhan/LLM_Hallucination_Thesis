# Qwen version-evolution timeline config (includes 80B checkpoint)
# Study target: CE trend over time across Qwen generations.

protocol:
  version: v3
  high_rigor: true
  prompt_version: qa-short-v1
commercial_models: []
opensource_models:
- provider: huggingface
  model: Qwen/Qwen2.5-7B-Instruct
  name: Qwen2.5 7B Instruct (HF, older)
- provider: huggingface
  model: Qwen/Qwen3-8B
  name: Qwen3 8B (HF)
- provider: openrouter
  model: qwen/qwen3-30b-a3b-instruct-2507
  name: Qwen3 30B A3B Instruct 2507 (OpenRouter)
- provider: openrouter
  model: qwen/qwen3-next-80b-a3b-instruct
  name: Qwen3 Next 80B A3B Instruct (OpenRouter, latest in study)
judge:
  method: nli
  enforce_cross_family: false
  repeat_eval_fraction: 0.1
  nli:
    model: MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
    entailment_threshold: 0.5
    different_threshold: 0.3
    max_length: 512
    device: null
  llm_judge:
    provider: openai
    model: gpt-4o
    max_new_tokens: 320
    cot_reasoning: true
  llm_judge_ensemble:
  - provider: openai
    model: gpt-5.2
  - provider: anthropic
    model: claude-sonnet-4-5
  - provider: xai
    model: grok-4-1-fast-non-reasoning
  ensemble:
    failure_policy: skip
  adjudicator:
    enabled: true
    provider: openai
    model: gpt-5.2
    max_new_tokens: 320
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514
inference:
  greedy:
    do_sample: false
    temperature: 0.01
    top_p: 1.0
    top_k: null
    max_new_tokens: 100
  stochastic:
    do_sample: true
    temperature: 0.7
    top_p: 0.9
    num_samples: 10
    max_new_tokens: 100
collection:
  required_samples: 10
  strict_samples: true
  retry_incomplete: true
  max_concurrency_per_provider: 4
correctness:
  use_nli_fallback: false
  nli_entailment_threshold: 0.5
  strip_articles: true
  max_length_ratio: 3.0
semantic:
  equivalence_threshold: 0.9
  unclear_treatment: exclude
semantic_entropy:
  use_normalized: true
  threshold: 0.35
hybrid:
  enabled: true
  thresholds:
    eq_same_hi: 0.7
    eq_diff_lo: 0.3
    corr_hi: 0.7
    corr_lo: 0.3
  borderline_judge:
    provider: openai
    model: gpt-5.2
    equivalence_max_new_tokens: 220
    correctness_max_new_tokens: 260
  calibration_file: /Users/simar/LLM_Hallucination_Measure/data/calibration/hybrid_thresholds_frozen.json
dataset:
  name: truthful_qa
  source: csv
  path: TruthfulQA.csv
  split: validation
  max_questions: null
  benchmarks:
  - name: truthful_qa
    source: csv
    path: TruthfulQA.csv
    split: validation
    max_questions: null
contamination:
  similarity_threshold: 0.93
  jaccard_threshold: 0.85
  lookback: 5000
rate_limits:
  openai:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  anthropic:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  google:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  xai:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  huggingface:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  openrouter:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
rate_limit:
  initial_delay: 2.0
  max_delay: 60.0
  backoff_factor: 2.0
calibration:
  nli_calibration_file: null
  hybrid_calibration_file: /Users/simar/LLM_Hallucination_Measure/data/calibration/hybrid_thresholds_frozen.json
  annotation_sample_size: 50
output:
  results_dir: data/results
  raw_dir: raw
  evaluated_dir: evaluated
  results_file: results_qwen_evolution_timeline.jsonl
  evaluated_file: results_qwen_evolution_timeline_eval.jsonl
  parquet_file: results_qwen_evolution_timeline.parquet
  immutable_runs: true
analysis:
  require_uniform_protocol: true
experiment:
  run_commercial: false
  run_opensource: true
  verbose: false
