# Llama + DeepSeek + Grok config on the matched 807 TruthfulQA subset.
# Keeps the same protocol as existing Qwen version-evolution runs.

protocol:
  version: v3
  high_rigor: true
  prompt_version: qa-short-v1

commercial_models:
  - provider: xai
    model: grok-4-fast-non-reasoning
    name: "Grok 4 (xAI, 2025-07-09)"
    snapshot_id: grok-4-fast-non-reasoning
    release_date: "2025-07-09"
    track: llama-deepseek-grok
    family: xai
    version_index: 0

opensource_models:
  - provider: groq
    model: meta-llama/llama-4-maverick-17b-128e-instruct
    name: "Llama 4 Maverick 17B (Groq, 2025-04-05)"
    snapshot_id: meta-llama/llama-4-maverick-17b-128e-instruct
    release_date: "2025-04-05"
    track: llama-deepseek-grok
    family: llama
    version_index: 1

  - provider: deepseek
    model: deepseek-chat
    name: "DeepSeek V3.2 (DeepSeek, 2025-12-01)"
    snapshot_id: deepseek-chat
    release_date: "2025-12-01"
    track: llama-deepseek-grok
    family: deepseek
    version_index: 2

judge:
  method: nli
  enforce_cross_family: false
  repeat_eval_fraction: 0.10
  nli:
    model: MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
    entailment_threshold: 0.5
    different_threshold: 0.3
    max_length: 512
    device: null
  llm_judge:
    provider: openai
    model: gpt-5.2
    max_new_tokens: 320
    cot_reasoning: true
  llm_judge_ensemble:
    - provider: openai
      model: gpt-5.2
    - provider: anthropic
      model: claude-sonnet-4-5
    - provider: xai
      model: grok-4-1-fast-non-reasoning
  ensemble:
    failure_policy: skip
  adjudicator:
    enabled: true
    provider: openai
    model: gpt-5.2
    max_new_tokens: 320
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514

inference:
  greedy:
    do_sample: false
    temperature: 0.01
    top_p: 1.0
    top_k: null
    max_new_tokens: 100
  stochastic:
    do_sample: true
    temperature: 0.7
    top_p: 0.9
    num_samples: 10
    max_new_tokens: 100

collection:
  required_samples: 10
  strict_samples: true
  retry_incomplete: true
  max_concurrency_per_provider: 4

correctness:
  use_nli_fallback: false
  nli_entailment_threshold: 0.5
  strip_articles: true
  max_length_ratio: 3.0

semantic:
  equivalence_threshold: 0.9
  unclear_treatment: exclude

semantic_entropy:
  use_normalized: true
  threshold: 0.35

hybrid:
  enabled: true
  thresholds:
    eq_same_hi: 0.70
    eq_diff_lo: 0.30
    corr_hi: 0.70
    corr_lo: 0.30
  borderline_judge:
    provider: openai
    model: gpt-5.2
    equivalence_max_new_tokens: 220
    correctness_max_new_tokens: 260
  calibration_file: /Users/simar/LLM_Hallucination_Measure/data/calibration/hybrid_thresholds_frozen.json

dataset:
  name: truthful_qa
  source: csv
  path: TruthfulQA_807_matched.csv
  split: validation
  max_questions: null
  benchmarks:
    - name: truthful_qa
      source: csv
      path: TruthfulQA_807_matched.csv
      split: validation
      max_questions: null

contamination:
  similarity_threshold: 0.93
  jaccard_threshold: 0.85
  lookback: 5000

rate_limits:
  openai:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  anthropic:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  xai:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  deepseek:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  groq:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  openrouter:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0

rate_limit:
  initial_delay: 2.0
  max_delay: 60.0
  backoff_factor: 2.0

calibration:
  nli_calibration_file: null
  hybrid_calibration_file: /Users/simar/LLM_Hallucination_Measure/data/calibration/hybrid_thresholds_frozen.json
  annotation_sample_size: 50

output:
  results_dir: data/results
  raw_dir: raw
  evaluated_dir: evaluated
  results_file: results_version_evolution_llama_deepseek_grok_807.jsonl
  evaluated_file: results_version_evolution_llama_deepseek_grok_807_eval.jsonl
  parquet_file: results_version_evolution_llama_deepseek_grok_807.parquet
  immutable_runs: true

analysis:
  require_uniform_protocol: true

experiment:
  run_commercial: true
  run_opensource: true
  verbose: false
