# Version-evolution study config (closed + open families, dated snapshots when available).
# Goal: paired CE-over-time analysis with track-aware metadata.

protocol:
  version: v3
  high_rigor: true
  prompt_version: qa-short-v1

commercial_models:
  # OpenAI capability track (dated snapshots)
  - provider: openai
    model: gpt-4o-2024-11-20
    name: "GPT-4o (OpenAI, 2024-11-20)"
    snapshot_id: gpt-4o-2024-11-20
    release_date: "2024-11-20"
    track: openai-capability
    family: openai
    version_index: 0
  - provider: openai
    model: gpt-5.1-2025-11-13
    name: "GPT-5.1 (OpenAI, 2025-11-13)"
    snapshot_id: gpt-5.1-2025-11-13
    release_date: "2025-11-13"
    track: openai-capability
    family: openai
    version_index: 1
  - provider: openai
    model: gpt-5.4-2026-03-05
    name: "GPT-5.4 (OpenAI, 2026-03-05)"
    snapshot_id: gpt-5.4-2026-03-05
    release_date: "2026-03-05"
    track: openai-capability
    family: openai
    version_index: 2

  # Anthropic capability track
  - provider: anthropic
    model: claude-3-5-sonnet-20240620
    name: "Claude 3.5 Sonnet (Anthropic, 2024-06-20)"
    snapshot_id: claude-3-5-sonnet-20240620
    release_date: "2024-06-20"
    track: anthropic-capability
    family: anthropic
    version_index: 0
  - provider: anthropic
    model: claude-sonnet-4-20250514
    name: "Claude Sonnet 4 (Anthropic, 2025-05-14)"
    snapshot_id: claude-sonnet-4-20250514
    release_date: "2025-05-14"
    track: anthropic-capability
    family: anthropic
    version_index: 1
  - provider: anthropic
    model: claude-sonnet-4-6
    name: "Claude Sonnet 4.6 (Anthropic, 2026-02)"
    snapshot_id: claude-sonnet-4-6
    release_date: "2026-02-27"
    track: anthropic-capability
    family: anthropic
    version_index: 2

  # xAI capability track
  - provider: xai
    model: grok-4
    name: "Grok 4 (xAI, 2025-07-09)"
    snapshot_id: grok-4
    release_date: "2025-07-09"
    track: xai-capability
    family: xai
    version_index: 0
  - provider: xai
    model: grok-4.1
    name: "Grok 4.1 (xAI, 2025-11-17)"
    snapshot_id: grok-4.1
    release_date: "2025-11-17"
    track: xai-capability
    family: xai
    version_index: 1
  - provider: xai
    model: grok-4.20-beta
    name: "Grok 4.20 Beta (xAI, 2026-03-10)"
    snapshot_id: grok-4.20-beta
    release_date: "2026-03-10"
    track: xai-capability
    family: xai
    version_index: 2

opensource_models:
  # Qwen small capability-like track
  - provider: huggingface_local
    model: Qwen/Qwen1.5-7B-Chat
    name: "Qwen1.5 7B Chat (Local, 2024-01-30)"
    snapshot_id: Qwen/Qwen1.5-7B-Chat
    release_date: "2024-01-30"
    track: qwen-small
    family: qwen
    version_index: 0
  - provider: openrouter
    model: qwen/qwen-2.5-7b-instruct
    name: "Qwen2.5 7B Instruct (OpenRouter, 2024-09-16)"
    snapshot_id: qwen/qwen-2.5-7b-instruct
    release_date: "2024-09-16"
    track: qwen-small
    family: qwen
    version_index: 1
  - provider: openrouter
    model: qwen/qwen3-8b
    name: "Qwen3 8B (OpenRouter, 2025-04-27)"
    snapshot_id: qwen/qwen3-8b
    release_date: "2025-04-27"
    track: qwen-small
    family: qwen
    version_index: 2
    request_overrides:
      reasoning:
        enabled: false

  # Qwen frontier scale+version track
  - provider: openrouter
    model: qwen/qwen-2.5-72b-instruct
    name: "Qwen2.5 72B Instruct (OpenRouter, 2024-11-26)"
    snapshot_id: qwen/qwen-2.5-72b-instruct
    release_date: "2024-11-26"
    track: qwen-frontier
    family: qwen
    version_index: 0
  - provider: openrouter
    model: qwen/qwen3-30b-a3b-instruct-2507
    name: "Qwen3 30B A3B 2507 (OpenRouter, 2025-07-28)"
    snapshot_id: qwen/qwen3-30b-a3b-instruct-2507
    release_date: "2025-07-28"
    track: qwen-frontier
    family: qwen
    version_index: 1
  - provider: openrouter
    model: qwen/qwen3-next-80b-a3b-instruct
    name: "Qwen3 Next 80B A3B (OpenRouter, 2025-09-09)"
    snapshot_id: qwen/qwen3-next-80b-a3b-instruct
    release_date: "2025-09-09"
    track: qwen-frontier
    family: qwen
    version_index: 2

judge:
  method: nli
  enforce_cross_family: false
  repeat_eval_fraction: 0.10
  nli:
    model: MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli
    entailment_threshold: 0.5
    different_threshold: 0.3
    max_length: 512
    device: null
  llm_judge:
    provider: openai
    model: gpt-5.2
    max_new_tokens: 320
    cot_reasoning: true
  llm_judge_ensemble:
    - provider: openai
      model: gpt-5.2
    - provider: anthropic
      model: claude-sonnet-4-5
    - provider: xai
      model: grok-4-1-fast-non-reasoning
  ensemble:
    failure_policy: skip
  adjudicator:
    enabled: true
    provider: openai
    model: gpt-5.2
    max_new_tokens: 320
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514

inference:
  greedy:
    do_sample: false
    temperature: 0.01
    top_p: 1.0
    top_k: null
    max_new_tokens: 100
  stochastic:
    do_sample: true
    temperature: 0.7
    top_p: 0.9
    num_samples: 10
    max_new_tokens: 100

collection:
  required_samples: 10
  strict_samples: true
  retry_incomplete: true
  max_concurrency_per_provider: 4

correctness:
  use_nli_fallback: false
  nli_entailment_threshold: 0.5
  strip_articles: true
  max_length_ratio: 3.0

semantic:
  equivalence_threshold: 0.9
  unclear_treatment: exclude

semantic_entropy:
  use_normalized: true
  threshold: 0.35

hybrid:
  enabled: true
  thresholds:
    eq_same_hi: 0.70
    eq_diff_lo: 0.30
    corr_hi: 0.70
    corr_lo: 0.30
  borderline_judge:
    provider: openai
    model: gpt-5.2
    equivalence_max_new_tokens: 220
    correctness_max_new_tokens: 260
  calibration_file: data/calibration/hybrid_thresholds_frozen.json

dataset:
  name: truthful_qa
  source: csv
  path: TruthfulQA.csv
  split: validation
  max_questions: null
  benchmarks:
    - name: truthful_qa
      source: csv
      path: TruthfulQA.csv
      split: validation
      max_questions: null

contamination:
  similarity_threshold: 0.93
  jaccard_threshold: 0.85
  lookback: 5000

rate_limits:
  openai:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  anthropic:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  google:
    initial_delay: 1.0
    max_delay: 60.0
    backoff_factor: 2.0
  xai:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  huggingface:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0
  huggingface_local:
    initial_delay: 0.5
    max_delay: 10.0
    backoff_factor: 1.5
  openrouter:
    initial_delay: 2.0
    max_delay: 60.0
    backoff_factor: 2.0

rate_limit:
  initial_delay: 2.0
  max_delay: 60.0
  backoff_factor: 2.0

calibration:
  nli_calibration_file: null
  hybrid_calibration_file: data/calibration/hybrid_thresholds_frozen.json
  annotation_sample_size: 50

output:
  results_dir: data/results
  raw_dir: raw
  evaluated_dir: evaluated
  results_file: results_version_evolution_full_timeline.jsonl
  evaluated_file: results_version_evolution_full_timeline_eval.jsonl
  parquet_file: results_version_evolution_full_timeline.parquet
  immutable_runs: true

analysis:
  require_uniform_protocol: true

experiment:
  run_commercial: true
  run_opensource: true
  verbose: false
